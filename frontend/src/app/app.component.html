<ng-container *ngIf="auth.isLoggedIn()">
  <nav class="navbar">
    <div class="nav-content">

      <!-- Brand -->
      <a routerLink="/" class="brand">
        <span class="brand-icon">🏒</span>
        <span class="brand-text">NHL Pool</span>
      </a>

      <!-- Desktop links -->
      <div class="nav-links">
        <a routerLink="/"        routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Standings</a>
        <a routerLink="/series"  routerLinkActive="active">Series</a>
        <a routerLink="/players" routerLinkActive="active">Players</a>
        <a routerLink="/teams"   routerLinkActive="active">Teams</a>
        <a *ngIf="!draftCompleted()"
           routerLink="/draft"
           routerLinkActive="active"
           [class.highlight]="draftActive()">Draft</a>
        <a *ngIf="auth.isAdmin()" routerLink="/admin" routerLinkActive="active" class="admin-link">Admin</a>
      </div>

      <!-- Desktop user -->
      <div class="nav-user desktop-user">
        <span class="user-name">{{ auth.user()?.displayName }}</span>
        <button class="btn-logout" (click)="auth.logout()">Logout</button>
      </div>

    </div>
  </nav>
</ng-container>

<router-outlet />

<!-- Mobile bottom nav -->
<app-mobile-nav
  *ngIf="auth.isLoggedIn()"
  [draftActive]="draftActive()"
  [draftCompleted]="draftCompleted()"
  [isAdmin]="auth.isAdmin()" />
