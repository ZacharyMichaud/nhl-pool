<div class="page-container">

  <div class="standings-table-card" *ngIf="standings().length > 0; else empty">
    <div class="table-scroll">
      <table class="standings-table">
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th class="col-team">Team</th>
            <th class="col-stat">Player Pts</th>
            <th class="col-stat">Pred Pts</th>
            <th class="col-stat col-total">Total</th>
            <th class="col-nav"></th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let team of standings(); let i = index"
            class="team-row"
            [class.my-team-row]="isMyTeam(team.teamId)"
            (click)="goToTeam(team.teamId)"
            tabindex="0"
            (keydown.enter)="goToTeam(team.teamId)">

            <!-- Rank -->
            <td class="col-rank">
              <span class="rank-badge" [ngClass]="'rank-' + (i < 3 ? (i + 1) : 'other')">
                {{ i + 1 }}
              </span>
            </td>

            <!-- Team -->
            <td class="col-team">
              <div class="team-cell">
                <span class="team-name">{{ team.teamName }}</span>
                <span class="team-members">{{ team.memberNames?.join(' & ') }}</span>
              </div>
            </td>

            <!-- Player Points -->
            <td class="col-stat">
              <span class="stat-val">{{ team.playerPoints }}</span>
            </td>

            <!-- Prediction Points -->
            <td class="col-stat">
              <span class="stat-val">{{ team.predictionPoints }}</span>
            </td>

            <!-- Total -->
            <td class="col-stat col-total">
              <span class="total-val">{{ team.totalPoints }}</span>
            </td>

            <!-- Arrow -->
            <td class="col-nav">
              <span class="nav-arrow">→</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <ng-template #empty>
    <div class="card">
      <p class="empty-msg">No standings yet — complete the draft first!</p>
    </div>
  </ng-template>
</div>
