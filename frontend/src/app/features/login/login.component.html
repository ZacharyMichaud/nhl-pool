<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <span class="logo">🏒</span>
      <h1>NHL Pool</h1>
      <p>Sign in to manage your playoff pool</p>
    </div>
    <div *ngIf="error" class="error-msg">{{ error }}</div>
    <form (ngSubmit)="login()">
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input matInput [(ngModel)]="username" name="username" required autocomplete="username">
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Password</mat-label>
        <input matInput [(ngModel)]="password" name="password" type="password" required autocomplete="current-password">
      </mat-form-field>
      <button mat-flat-button color="primary" type="submit" class="submit-btn" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>
    <p class="auth-footer">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
